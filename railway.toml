[build]
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "[ -f /tmp/db.sqlite ] || cp seed.sqlite /tmp/db.sqlite; npx next start -H 0.0.0.0 -p ${PORT:-3000}"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"

[[deploy.envVars]]
name = "NODE_ENV"
value = "production"
